# Lock screen (run with Super+Escape, or automatically when idle).

background {
    monitor =
    color = rgba(30, 30, 46, 1.0)
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.3
    outer_color = rgba(89b4faee)
    inner_color = rgba(1e1e2eee)
    font_color = rgba(cdd6f4ff)
    placeholder_text = Password...
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    color = rgba(cdd6f4ff)
    position = 0, 120
    halign = center
    valign = center
}
