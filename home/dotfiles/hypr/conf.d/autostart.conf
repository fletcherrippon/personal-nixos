# Programs launched when the session starts.

# waybar removed — replaced by the EWW top bar (eww open topbar, below)
exec-once = mako                                # notifications
exec-once = swww-daemon                          # wallpaper daemon (CPU-based, VM-safe)
exec-once = sleep 0.5 ; swww img ~/.cache/wallpaper.png || swww clear 080808
exec-once = hypridle                            # idle / auto-lock
exec-once = hyprpolkitagent                     # graphical auth prompts
exec-once = nm-applet --indicator              # network tray icon
exec-once = wl-paste --watch cliphist store     # record clipboard history
exec-once = eww open topbar                    # EWW demo widget (toggle: Super+`)
