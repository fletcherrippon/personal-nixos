# ── The look. This is the heart of "ricing" — tweak freely. ──────────

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(89b4faee) rgba(cba6f7ee) 45deg
    col.inactive_border = rgba(45475aaa)
    layout = dwindle
}

decoration {
    rounding = 10

    blur {
        enabled = false
        size = 6
        passes = 2
    }
    # Blur can be heavy under VM software rendering. If the desktop feels
    # sluggish, set `enabled = false` above.
}

animations {
    enabled = true
    bezier = ease, 0.25, 0.1, 0.25, 1.0
    animation = windows, 1, 5, ease
    animation = fade, 1, 5, ease
    animation = workspaces, 1, 5, ease
}

dwindle {
    preserve_split = true
}
