# ── The look. This is the heart of "ricing" — tweak freely. ──────────

general {
    gaps_in = $gaps_in
    gaps_out = $gaps_out
    border_size = $border
    col.active_border = $accent $accent2 45deg
    col.inactive_border = $surface1
    layout = dwindle
}

decoration {
    rounding = $radius

    blur {
        enabled = true
        size = 16
        passes = 4
    }
    # Blur can be heavy under VM software rendering. If the desktop feels
    # sluggish, set `enabled = false` above.
}

# Blur behind the eww top bar (its layer namespace is gtk-layer-shell -- see
# `hyprctl layers`). Hyprland 0.55 syntax: each clause is `key value`, comma-
# separated; effects are `blur true` / `ignore_alpha 0.1`, matcher is
# `match:namespace <regex>`. The bar's opacity lets the blur show through.
layerrule = blur true, ignore_alpha 0.1, match:namespace gtk-layer-shell

animations {
    enabled = true

    # Short, snappy animations read as "smooth" even at VM frame rates —
    # long animations just expose the lower framerate. Speeds are in
    # deciseconds (3 = 0.3s). Bump them back up if you prefer slower.
    bezier = snappy, 0.05, 0.9, 0.1, 1.0
    animation = windows, 1, 2, snappy
    animation = windowsOut, 1, 2, snappy, popin 80%
    animation = fade, 1, 2, snappy
    animation = workspaces, 1, 2, snappy
    animation = border, 1, 2, snappy
}

dwindle {
    preserve_split = true
}
