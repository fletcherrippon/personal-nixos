# Per-window behaviour. `hyprctl clients` shows an app's class/title.

# Disabled for now: Hyprland 0.55 is mid-migration (hyprlang → Lua) and the
# window-rule syntax is unstable this release. `windowrule` errors and
# `windowrulev2` is deprecated. Re-add float rules once the syntax settles.
# Old (deprecated) form was:
#   windowrulev2 = float, class:^(pavucontrol)$
#   windowrulev2 = float, class:^(nm-connection-editor)$
#   windowrulev2 = float, title:^(Open File)$
#   windowrulev2 = float, title:^(Save File)$

# Example: always open Firefox on workspace 2
# windowrule = workspace 2, class:^(firefox)$
