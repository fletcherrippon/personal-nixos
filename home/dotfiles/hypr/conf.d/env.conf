# Session environment

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# Force Wayland where apps support it
env = NIXOS_OZONE_WL,1
env = MOZ_ENABLE_WAYLAND,1
env = QT_QPA_PLATFORM,wayland
env = GDK_BACKEND,wayland,x11

# In a VM, hardware cursors can render as an invisible/garbled pointer.
# This forces a software cursor and fixes it.
cursor {
    no_hardware_cursors = true
}
