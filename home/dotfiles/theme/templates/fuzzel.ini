@out ~/.config/fuzzel/fuzzel.ini
# AUTO-GENERATED from theme.conf + this template. fuzzel colours are RRGGBBAA.
[main]
font={{font}}:size={{font_size}}
terminal=ghostty
prompt=>
width=40
lines=12

[colors]
background={{base.alpha}}
text={{text}}ff
selection={{accent}}ff
selection-text={{base}}ff
border={{accent}}ff

[border]
width={{border}}
radius={{radius}}
