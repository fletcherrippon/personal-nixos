# ─────────────────────────────────────────────────────────────────────
# theme.conf — THE single source of truth. Add a variable here and it appears
# in eww / waybar / hyprland automatically (no other files to touch). The type
# is inferred from the value's syntax and rendered correctly per tool:
#
#   #rrggbb        colour          #rrggbb@PP   colour + PP% opacity
#   <n>px/em/rem   length          <n>          plain number
#   anything else  text
# ─────────────────────────────────────────────────────────────────────

# ── Palette (moonfly) ──
base=#080808
mantle=#000000
surface=#323437
surface1=#4e4e4e
overlay=#717171
text=#bdbdbd
subtext=#949494
blue=#80a0ff
mauve=#cf87e8
green=#8cc85f
red=#ff5d5d
yellow=#e3c78a
peach=#e3c78a
teal=#79dac8
accent=#80a0ff
accent2=#cf87e8

# Panel background: a PURE colour. Opacity is NEVER baked into a colour --
# translucency comes from the separate `opacity` var below, applied via the
# `opacity` property in the styles.
bg=#080808

# ── Sizes ──
radius=6px
radius_full=9999px
border=2px
gaps_in=4
gaps_out=6
spacing=4px

# ── Opacity ──
# Panel translucency. Applied via the `opacity` property, never baked into a
# colour. 1 = opaque, 0 = invisible.
opacity=0.50

# ── Font ──
font=JetBrainsMono Nerd Font
font_size=18px

# ── Wallpaper ──
# Source image (any colours); recoloured to the palette. Blank = solid base.
wallpaper=~/personal-nixos/home/dotfiles/walls/wave.png

# How the recoloured wallpaper is composited (tune, then re-run `theme`):
wall_blend=40       # % themed vs original (lower = more original colour = more pop)
wall_brightness=105 # modulate brightness %
wall_saturation=150 # modulate saturation % (higher = punchier colours)
wall_darken=75      # top gradient darkness % toward base (higher = darker background)
