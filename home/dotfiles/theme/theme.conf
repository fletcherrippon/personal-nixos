# ─────────────────────────────────────────────────────────────────────
# theme.conf — THE single source of truth for your whole rice.
# Edit values here, then run:  theme
# (that regenerates the per-tool fragments and reloads everything live.)
#
# Colours are hex WITHOUT the leading '#'.
# ─────────────────────────────────────────────────────────────────────

# ── Palette (moonfly) ──
base=080808
mantle=000000
surface=323437
surface1=4e4e4e
overlay=717171
text=bdbdbd
subtext=949494
blue=80a0ff
mauve=cf87e8
green=8cc85f
red=ff5d5d
yellow=e3c78a
peach=e3c78a
teal=79dac8

# ── Accents (used for highlights / active borders) ──
accent=80a0ff
accent2=cf87e8

# ── Sizes (px / Hyprland units) ──
radius=6
radius_full=9999
border=2
gaps_in=4
gaps_out=6

# ── Font ──
font=JetBrainsMono Nerd Font
font_size=14

# ── Panel background opacity, as a percent 0–100 ──
opacity=85

# ── Wallpaper ──
# A SOURCE image (any colours). `theme` recolours it to the palette above with
# lutgen, then sets it. Blank = solid-colour background. Example:
#   wallpaper=~/personal-nixos/home/dotfiles/walls/mountains.jpg
wallpaper=
